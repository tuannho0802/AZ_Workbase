name: Sync Code to FastPanel via FTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 📂 Sync files to Server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Đường dẫn thư mục trên server (lấy từ FastPanel)
          server-dir: /var/www/hv_azacademy_usr/data/www/az-workbase.com/
          # Loại trừ các file không cần thiết để sync nhanh hơn
          exclude: |
            **/.git*
            **/node_modules/**
            **/dist/**
            **/.next/**